<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>太阳-地球-月亮 模型 WebVR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>
<a-scene background="color: black">

  <!-- 资源预加载 -->
  <a-assets>
    <img id="sunTex" src="sun.png">
    <img id="earthTex" src="earth.png">
    <img id="moonTex" src="moon.png">
  </a-assets>

  <!-- 光照, 太阳光 -->
  <a-entity light="type: point; intensity: 3; distance: 100; decay: 2"
            position="0 0 0">
  </a-entity>

  <!-- 相机 -->
  <a-entity camera look-controls position="0 1.6 5">
    <!-- 屏幕中心为凝视视线 -->
    <a-cursor fuse="true" fuse-timeout="1000"
              material="color: white; shader: flat"></a-cursor>
  </a-entity>

  <!-- 太阳 -->
  <a-sphere id="sun" position="0 0 0" radius="1.2"
            material="src: #sunTex; shader: flat"
            class="clickable">
  </a-sphere>

  <!-- 地球轨道, 地球做圆周运动 -->
  <a-entity id="earth-orbit">
    <!-- 地轴倾角 -->
    <a-entity id="earth-tilt" rotation="23.5 0 0">
      <!-- 地球, 自转 -->
      <a-sphere id="earth" position="3 0 0" radius="0.5"
                material="src: #earthTex"
                class="clickable">

        <!-- 月球轨道, 月球做圆周运动 -->
        <a-entity id="moon-orbit" rotation="5.145 0 0">
          <!-- 月球 -->
          <a-sphere id="moon" position="1 0 0" radius="0.2"
                    material="src: #moonTex"
                    class="clickable">
          </a-sphere>
        </a-entity>
      </a-sphere>
    </a-entity>
  </a-entity>

</a-scene>

<script>
// 凝视交互：改变颜色
AFRAME.registerComponent('gaze-color', {
  init: function () {
    let el = this.el;

    let originalColor = el.getAttribute('material').color || null;

    el.addEventListener('mouseenter', function () {
      el.setAttribute('material', 'color', 'red');
    });

    el.addEventListener('mouseleave', function () {
      if (originalColor) {
        el.setAttribute('material', 'color', originalColor);
      } else {
        el.removeAttribute('material', 'color');
      }
    });
  }
});

// 给所有可交互物体添加组件
window.onload = function () {
  document.querySelectorAll('.clickable').forEach(function (el) {
    el.setAttribute('gaze-color', '');
  });
};

// 旋转
AFRAME.registerComponent('orbit-sim', {
  init: function () {
    // 地球公转角
    this.earthAngle = 0;
    // 地球自转角
    this.earthSelf = 0;
    // 月球公转角
    this.moonAngle = 0;
    // 月球自转角
    this.moonSelf = 0;

    // 获取节点
    this.earthOrbit = document.querySelector('#earth-orbit');
    this.earth = document.querySelector('#earth');
    this.moonOrbit = document.querySelector('#moon-orbit');
  },

  tick: function (time, dt) {
    let delta = dt / 1000;

    // 地球公转
    this.earthAngle += 10 * delta;
    this.earthOrbit.setAttribute('rotation', {
      x: 0,
      y: this.earthAngle,
      z: 0
    });

    // 地球自转
    this.earthSelf += 40 * delta;
    this.earth.setAttribute('rotation', {
      x: 0,
      y: this.earthSelf,
      z: 0
    });

    // 月球公转
    this.moonAngle += 60 * delta;
    this.moonOrbit.setAttribute('rotation', {
      x: 5.145,
      y: this.moonAngle,
      z: 0
    });

    // 月球自转
    this.moonSelf += 60 * delta;
    document.querySelector('#moon').setAttribute('rotation', {
      x: 0,
      y: this.moonSelf,
      z: 0
    });
  }
});

// 启动旋转
document.querySelector('a-scene').setAttribute('orbit-sim', '');
</script>

</body>
</html>
